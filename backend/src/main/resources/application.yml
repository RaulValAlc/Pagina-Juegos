server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lista_juegos}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd

app:
  jwt:
    secret: ${JWT_SECRET:4a6f73652d4d617269612d4c697374612d4a7565676f732d5365637265742d4b65792d32303234}
    expiration-ms: ${JWT_EXPIRATION:86400000}

api:
  rawg:
    key: ${RAWG_API_KEY:}
    base-url: https://api.rawg.io/api

logging:
  level:
    com.listajuegos: DEBUG
    org.springframework.security: INFO
